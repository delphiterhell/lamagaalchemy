# ============================================================
# CONFIGURAZIONE DECAP CMS — La Maga Alchemy
#
# Autenticazione gestita tramite DecapBridge (decapbridge.com).
# ============================================================

# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: delphiterhell/lamagaalchemy
  branch: main
  identity_url: https://auth.decapbridge.com/sites/cc06a751-4569-4557-8064-bc6ddacfb0b7
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://lamaga-alchemy.netlify.app

# Interfaccia del pannello in italiano
locale: "it"

# Le foto caricate da Magalì vengono salvate qui nel repo
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "collezioni"
    label: "Collezioni"
    files:
      - name: "collezioni"
        label: "Pezzi delle collezioni"
        file: "content/collezioni.json"
        fields:
          - label: "Pezzi"
            name: "pezzi"
            widget: "list"
            label_singular: "Pezzo"
            summary: "{{nome}}"
            fields:
              - label: "Nome del pezzo"
                name: "nome"
                widget: "string"
              - label: "Categoria"
                name: "categoria"
                widget: "select"
                options:
                  - { label: "I Piccolini", value: "piccolini" }
                  - { label: "I Chokers", value: "chokers" }
                  - { label: "Pezzi Unici", value: "pezzi-unici" }
              - label: "Descrizione"
                name: "descrizione"
                widget: "text"
              - label: "Foto"
                name: "foto"
                widget: "image"
                required: false
                hint: "Carica la foto dal telefono: viene ottimizzata automaticamente dal sito."
              - label: "In evidenza"
                name: "in_evidenza"
                widget: "boolean"
                required: false
                default: false
                hint: "Per ora è solo un'etichetta interna, non cambia ancora l'aspetto della card."

  - name: "workshop"
    label: "Workshop"
    files:
      - name: "workshop"
        label: "Workshop"
        file: "content/workshop.json"
        fields:
          - label: "Testo introduttivo"
            name: "intro"
            widget: "text"
            hint: "Breve testo mostrato sopra le card dei workshop."
          - label: "Corsi"
            name: "corsi"
            widget: "list"
            label_singular: "Corso"
            summary: "{{nome}}"
            fields:
              - label: "Nome workshop"
                name: "nome"
                widget: "string"
              - label: "Descrizione"
                name: "descrizione"
                widget: "text"
              - label: "Durata"
                name: "durata"
                widget: "string"
                hint: "Es: 2 ore"
              - label: "Numero posti"
                name: "posti"
                widget: "string"
                hint: "Es: Max 6 persone"
              - label: "Livello"
                name: "livello"
                widget: "string"
                hint: "Es: Adatto a tutti"
              - label: "Icona"
                name: "icona"
                widget: "select"
                options:
                  - { label: "Fuoco", value: "fire" }
                  - { label: "Acqua", value: "water" }
                  - { label: "Terra", value: "earth" }
                  - { label: "Aria", value: "air" }
                  - { label: "Diamante", value: "diamond" }
                default: "fire"

  - name: "eventi"
    label: "Mercatini & Eventi"
    files:
      - name: "eventi"
        label: "Lista eventi"
        file: "content/eventi.json"
        fields:
          - label: "Eventi"
            name: "eventi"
            widget: "list"
            label_singular: "Evento"
            summary: "{{nome}} – {{data}}"
            fields:
              - label: "Nome evento"
                name: "nome"
                widget: "string"
              - label: "Data"
                name: "data"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "DD/MM/YYYY"
                time_format: false
                picker_utc: true
              - label: "Luogo"
                name: "luogo"
                widget: "string"
              - label: "Note"
                name: "note"
                widget: "text"
                required: false
